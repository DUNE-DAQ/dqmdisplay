{% extends "base.html" %}

{% block content %}
<div class="grid-container">

  <div class="row">
    <div class="col-md-12">
      {% if run and trigger %}
        <h1>ProtoDUNE DQM Tests: Run {{ run }}, Trigger {{ trigger }} – WIBs</h1>
      {% else %}
        <h1>ProtoDUNE DQM Tests: Latest WIBs</h1>
      {% endif %}
    </div>
  </div>

  {% for image in images %}
  <div class="row">
    <div class="image-container">
      <img src="{{ url_for('serve_image', subdir='WIBTests', filename=image) }}" alt="{{ image }}" loading="lazy"/>
    </div>
  </div>
  {% endfor %}

</div>
{% endblock %}
