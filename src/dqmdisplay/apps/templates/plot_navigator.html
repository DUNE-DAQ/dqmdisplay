{% extends "base.html" %}

{% block content %}
<div class="container-fluid">
    <div class="row">
        <div class="col-12">
            <h2 class="mb-4">Plot Navigator</h2>
            <p class="text-muted mb-4">
                Browse available plots organized by run and trigger. Click on run numbers to expand and see available triggers,
                then click on trigger numbers to see available plots for that combination.
            </p>
            
            <div id="runAccordion" class="accordion"></div>
        </div>
    </div>
</div>

<style>
/* Minimal styles for accordion */
.accordion .btn-link {
    text-align: left;
    width: 100%;
}
.fas.fa-chevron-right {
    transition: transform 0.2s ease-in-out;
}
button[aria-expanded="true"] .fas.fa-chevron-right {
    transform: rotate(90deg);
}
.card-body {
    padding: 0.5rem;
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {

    const runAccordion = document.getElementById('runAccordion');

    // Load initial runs (first page)
    fetch("{{ url_for('plot_navigator_runs') }}")
        .then(res => res.json())
        .then(data => {
            data.runs.forEach(run => {
                const runCard = document.createElement('div');
                runCard.className = "card mb-2";

                const runHeader = document.createElement('div');
                runHeader.className = "card-header";
                runHeader.id = `runHeading${run}`;

                runHeader.innerHTML = `
                    <h2 class="mb-0">
                        <button class="btn btn-link collapsed" type="button" 
                                data-toggle="collapse" data-target="#runCollapse${run}" 
                                aria-expanded="false" aria-controls="runCollapse${run}">
                            <i class="fas fa-chevron-right mr-2"></i>
                            <strong>Run ${run}</strong>
                        </button>
                    </h2>
                `;

                const runCollapse = document.createElement('div');
                runCollapse.className = "collapse";
                runCollapse.id = `runCollapse${run}`;
                runCollapse.setAttribute("aria-labelledby", `runHeading${run}`);
                runCollapse.setAttribute("data-parent", "#runAccordion");

                const bodyDiv = document.createElement('div');
                bodyDiv.className = "card-body";
                bodyDiv.innerHTML = `<div class="accordion" id="triggerAccordion${run}"></div>`;

                runCollapse.appendChild(bodyDiv);
                runCard.appendChild(runHeader);
                runCard.appendChild(runCollapse);
                runAccordion.appendChild(runCard);

                // Lazy-load triggers when run is expanded
                $(runCollapse).on('show.bs.collapse', function () {
                    const triggerAccordion = document.getElementById(`triggerAccordion${run}`);
                    if (triggerAccordion.childElementCount === 0) {
                        fetch(`{{ url_for('plot_navigator_triggers', run=0) }}`.replace("0", run))
                            .then(res => res.json())
                            .then(triggersData => {
                                triggersData.triggers.forEach(triggerObj => {
                                    const trigger = triggerObj.trigger;
                                    const plots = triggerObj.plots;
                                    const triggerCard = document.createElement('div');
                                    triggerCard.className = "card mb-1";

                                    const triggerHeader = document.createElement('div');
                                    triggerHeader.className = "card-header py-2";
                                    triggerHeader.id = `triggerHeading${run}${trigger}`;
                                    triggerHeader.innerHTML = `
                                        <h5 class="mb-0">
                                            <button class="btn btn-link btn-sm collapsed" type="button"
                                                    data-toggle="collapse" data-target="#triggerCollapse${run}${trigger}"
                                                    aria-expanded="false" aria-controls="triggerCollapse${run}${trigger}">
                                                <i class="fas fa-chevron-right mr-2" style="font-size:0.8em;"></i>
                                                <strong>Trigger ${trigger}</strong>
                                                <span class="badge badge-info badge-sm ml-2">${plots.length} plot(s)</span>
                                            </button>
                                        </h5>
                                    `;

                                    const triggerCollapse = document.createElement('div');
                                    triggerCollapse.className = "collapse";
                                    triggerCollapse.id = `triggerCollapse${run}${trigger}`;
                                    triggerCollapse.setAttribute("aria-labelledby", `triggerHeading${run}${trigger}`);
                                    triggerCollapse.setAttribute("data-parent", `#triggerAccordion${run}`);

                                    const triggerBody = document.createElement('div');
                                    triggerBody.className = "card-body py-2";
                                    const rowDiv = document.createElement('div');
                                    rowDiv.className = "row";

                                    plots.forEach(plot => {
                                        const colDiv = document.createElement('div');
                                        colDiv.className = "col-md-6 col-lg-4 mb-2";
                                        colDiv.innerHTML = `
                                            <div class="card border-light">
                                                <div class="card-body py-2 px-3">
                                                    <a href="${plot.url}" class="btn btn-outline-primary btn-sm btn-block text-left">
                                                        <i class="fas fa-chart-line mr-2"></i>
                                                        ${plot.display_name}
                                                    </a>
                                                </div>
                                            </div>
                                        `;
                                        rowDiv.appendChild(colDiv);
                                    });

                                    triggerBody.appendChild(rowDiv);
                                    triggerCollapse.appendChild(triggerBody);
                                    triggerCard.appendChild(triggerHeader);
                                    triggerCard.appendChild(triggerCollapse);
                                    triggerAccordion.appendChild(triggerCard);
                                });
                            });
                    }
                });
            });
        });

});
</script>
{% endblock %}
