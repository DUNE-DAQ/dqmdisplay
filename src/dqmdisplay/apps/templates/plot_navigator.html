{% extends "base.html" %}

{% block content %}
<div class="container-fluid">
    <div class="row">
        <div class="col-12">
            <h2 class="mb-4">Plot Navigator</h2>
            <p class="text-muted mb-4">
                Browse available plots organized by run and trigger. Click on run numbers to expand and see available triggers,
                then click on trigger numbers to see available plots grouped by display.
            </p>

            <!-- Controls row -->
            <div class="form-inline mb-3">
                <label for="pageSizeSelect" class="mr-2">Runs per page:</label>
                <select id="pageSizeSelect" class="form-control form-control-sm mr-3" style="width: auto;">
                    <option value="20">20</option>
                    <option value="50">50</option>
                    <option value="100">100</option>
                </select>
                <input type="text" id="runSearchInput" class="form-control form-control-sm flex-grow-1" placeholder="Search runs...">
            </div>

            <!-- Runs accordion -->
            <div id="runAccordion" class="accordion"></div>

            <!-- Pagination block -->
            <div class="d-flex flex-wrap justify-content-center align-items-center mt-3 mb-4" style="gap: 6px;">
                <button class="btn btn-primary btn-sm" id="firstPageBtn">&#171; First</button>
                <button class="btn btn-primary btn-sm" id="prevPageBtn">&#8249; Prev</button>
                <span id="pageInfo" class="px-2"></span>
                <button class="btn btn-primary btn-sm" id="nextPageBtn">Next &#8250;</button>
                <button class="btn btn-primary btn-sm" id="lastPageBtn">Last &#187;</button>
            </div>
        </div>
    </div>
</div>

<style>
.card-body {
    padding: 0.5rem;
}
.row > .col {
    padding-left: 0.25rem;
    padding-right: 0.25rem;
}
.fas.fa-chevron-right {
    transition: transform 0.2s ease-in-out;
}
button[aria-expanded="true"] .fas.fa-chevron-right {
    transform: rotate(90deg);
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
    let allRuns = [];
    let filteredRuns = [];
    let currentPage = 0;
    let pageSize = parseInt(document.getElementById('pageSizeSelect').value);

    const runAccordion = document.getElementById('runAccordion');
    const pageSizeSelect = document.getElementById('pageSizeSelect');
    const runSearchInput = document.getElementById('runSearchInput');
    const firstBtn = document.getElementById('firstPageBtn');
    const prevBtn = document.getElementById('prevPageBtn');
    const nextBtn = document.getElementById('nextPageBtn');
    const lastBtn = document.getElementById('lastPageBtn');
    const pageInfo = document.getElementById('pageInfo');

    pageSizeSelect.addEventListener('change', () => { pageSize = parseInt(pageSizeSelect.value); currentPage = 0; renderPage(); });
    runSearchInput.addEventListener('input', () => { currentPage = 0; filterRuns(); });

    firstBtn.addEventListener('click', () => { currentPage = 0; renderPage(); });
    prevBtn.addEventListener('click', () => { if(currentPage>0) currentPage--; renderPage(); });
    nextBtn.addEventListener('click', () => { if((currentPage+1)*pageSize < filteredRuns.length) currentPage++; renderPage(); });
    lastBtn.addEventListener('click', () => { currentPage = Math.floor((filteredRuns.length-1)/pageSize); renderPage(); });

    // Load runs
    fetch("{{ url_for('plot_navigator_runs') }}")
        .then(res => res.json())
        .then(data => {
            allRuns = data.runs;
            filteredRuns = allRuns.slice();
            renderPage();
        });

    function filterRuns() {
        const searchVal = runSearchInput.value.trim();
        if (searchVal === "") {
            filteredRuns = allRuns.slice();
        } else {
            filteredRuns = allRuns.filter(r => r.toString().includes(searchVal));
        }
        renderPage();
    }

    function renderPage() {
        runAccordion.innerHTML = "";
        const start = currentPage * pageSize;
        const end = Math.min(start + pageSize, filteredRuns.length);
        const runsToDisplay = filteredRuns.slice(start, end);

        pageInfo.textContent = `Page ${currentPage+1} of ${Math.ceil(filteredRuns.length/pageSize)}`;

        // Preload triggers for all runs on page
        runsToDisplay.forEach(run => {
            const runCard = document.createElement('div');
            runCard.className = "card mb-2";

            const runHeader = document.createElement('div');
            runHeader.className = "card-header";
            runHeader.id = `runHeading${run}`;
            runHeader.innerHTML = `
                <h2 class="mb-0">
                    <button class="btn btn-link collapsed" type="button" 
                            data-toggle="collapse" data-target="#runCollapse${run}" 
                            aria-expanded="false" aria-controls="runCollapse${run}">
                        <i class="fas fa-chevron-right mr-2"></i>
                        <strong>Run ${run}</strong>
                    </button>
                </h2>
            `;

            const runCollapse = document.createElement('div');
            runCollapse.className = "collapse";
            runCollapse.id = `runCollapse${run}`;
            runCollapse.setAttribute("aria-labelledby", `runHeading${run}`);
            runCollapse.setAttribute("data-parent", "#runAccordion");

            const bodyDiv = document.createElement('div');
            bodyDiv.className = "card-body";
            bodyDiv.innerHTML = `<div class="accordion" id="triggerAccordion${run}"></div>`;

            runCollapse.appendChild(bodyDiv);
            runCard.appendChild(runHeader);
            runCard.appendChild(runCollapse);
            runAccordion.appendChild(runCard);

            // Fetch triggers immediately
            const triggerAccordion = document.getElementById(`triggerAccordion${run}`);
            fetch(`{{ url_for('plot_navigator_triggers', run=0) }}`.replace("0", run))
                .then(res => res.json())
                .then(triggersData => {
                    // Add trigger count badge to run header
                    const runHeaderBtn = runHeader.querySelector('button');
                    const badgeSpan = document.createElement('span');
                    badgeSpan.className = 'badge badge-info ml-2';
                    badgeSpan.textContent = triggersData.num_triggers + ' trigger(s)';
                    runHeaderBtn.appendChild(badgeSpan);

                    triggersData.triggers.forEach(triggerObj => {
                        const trigger = triggerObj.trigger;
                        const plots = triggerObj.plots;
                        const displayNames = triggerObj.display_names.join(', ');

                        const triggerCard = document.createElement('div');
                        triggerCard.className = "card mb-1";

                        const triggerHeader = document.createElement('div');
                        triggerHeader.className = "card-header py-2";
                        triggerHeader.id = `triggerHeading${run}${trigger}`;
                        triggerHeader.innerHTML = `
                            <h5 class="mb-0">
                                <button class="btn btn-link btn-sm collapsed" type="button"
                                        data-toggle="collapse" data-target="#triggerCollapse${run}${trigger}"
                                        aria-expanded="false" aria-controls="triggerCollapse${run}${trigger}">
                                    <i class="fas fa-chevron-right mr-2" style="font-size:0.8em;"></i>
                                    <strong>Trigger ${trigger}</strong>
                                    <span class="badge badge-info badge-sm ml-2">${plots.length} plot(s)</span>
                                    <span class="badge badge-secondary badge-sm ml-1">${displayNames}</span>
                                </button>
                            </h5>
                        `;

                        const triggerCollapse = document.createElement('div');
                        triggerCollapse.className = "collapse";
                        triggerCollapse.id = `triggerCollapse${run}${trigger}`;
                        triggerCollapse.setAttribute("aria-labelledby", `triggerHeading${run}${trigger}`);
                        triggerCollapse.setAttribute("data-parent", `#triggerAccordion${run}`);

                        const triggerBody = document.createElement('div');
                        triggerBody.className = "card-body py-2";

                        // Group plots by display
                        const displayGroups = {};
                        plots.forEach(plot => {
                            const dispName = plot.display_name.split(' ')[0];
                            if (!displayGroups[dispName]) displayGroups[dispName] = [];
                            displayGroups[dispName].push(plot);
                        });

                        const table = document.createElement('table');
                        table.className = "table table-sm mb-0";

                        const headerRow = document.createElement('tr');
                        for (const disp in displayGroups) {
                            const th = document.createElement('th');
                            th.textContent = disp;
                            headerRow.appendChild(th);
                        }
                        table.appendChild(headerRow);

                        const maxRows = Math.max(...Object.values(displayGroups).map(a => a.length));
                        for (let i=0; i<maxRows; i++) {
                            const row = document.createElement('tr');
                            for (const disp in displayGroups) {
                                const td = document.createElement('td');
                                if (displayGroups[disp][i]) {
                                    const plot = displayGroups[disp][i];
                                    td.innerHTML = `<a href="${plot.url}" class="btn btn-outline-primary btn-sm btn-block text-left">
                                        <i class="fas fa-chart-line mr-1"></i>${plot.display_name}
                                    </a>`;
                                }
                                row.appendChild(td);
                            }
                            table.appendChild(row);
                        }

                        triggerBody.appendChild(table);
                        triggerCollapse.appendChild(triggerBody);
                        triggerCard.appendChild(triggerHeader);
                        triggerCard.appendChild(triggerCollapse);
                        triggerAccordion.appendChild(triggerCard);
                    });
                });
        });
    }
});
</script>
{% endblock %}
