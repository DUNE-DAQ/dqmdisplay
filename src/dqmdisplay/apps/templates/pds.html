{% extends "base.html" %}

{% block content %}
<div class="grid-container">

  <div class="row">
    <div class="col-md-12">
      {% if run and trigger %}
        <h1>NP04 DQM: Run {{ run }}, Trigger {{ trigger }} – PDS Plots</h1>
      {% else %}
        <h1>NP04 DQM: Latest PDS Plots</h1>
      {% endif %}
    </div>
  </div>

  {% for image in images %}
  <div class="row">
    <div class="image-container">
      <img src="{{ url_for('serve_image', subdir='pds_plots', filename=image) }}" alt="{{ image }}" loading="lazy"/>
    </div>
  </div>
  {% endfor %}

</div>
{% endblock %}
